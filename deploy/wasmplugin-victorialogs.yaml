# ──────────────────────────────────────────────────────────────────────
# Example: Deploy wasm-wiretap with VictoriaLogs backend
# ──────────────────────────────────────────────────────────────────────
#
# VictoriaLogs natively supports the Loki push API at a prefixed path:
#   /insert/loki/api/v1/push
#
# It also supports OTLP/HTTP at:
#   /insert/opentelemetry/v1/logs
#
# This example uses the Loki-compatible endpoint. To use OTLP instead,
# change backend to "otlp" and upstream_path to
# "/insert/opentelemetry/v1/logs".
#
# The _msg field required by VictoriaLogs is included in the log line
# automatically by the plugin.
#
# Docs: https://docs.victoriametrics.com/victorialogs/data-ingestion/
# ──────────────────────────────────────────────────────────────────────

---
# ServiceEntry so Envoy knows how to reach VictoriaLogs.
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: victorialogs
  namespace: openshift-ingress
spec:
  hosts:
    - vlinsert-ingress-logs.openshift-ingress-logs.svc.cluster.local.
  ports:
    - number: 9481
      name: http
      protocol: HTTP
  resolution: DNS
  location: MESH_INTERNAL

---
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: wasm-wiretap
  namespace: openshift-ingress
spec:
  # Target the gateway workload(s).
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: https-gateway # ← change to your Gateway name

  # Where Istio pulls the .wasm binary from (OCI image).
  url: oci://registry.arthurvardevanyan.com/homelab/wasm-wiretap:latest

  # Phase – AUTHN runs early; STATS runs late.  For passive capture
  # we typically want STATS so we see final response codes.
  phase: STATS
  priority: 1

  # JSON config forwarded to the plugin's on_configure().
  pluginConfig:
    backend: "loki"
    upstream_cluster: "outbound|9481||vlinsert-ingress-logs.openshift-ingress-logs.svc.cluster.local."
    upstream_authority: "vlinsert-ingress-logs.openshift-ingress-logs.svc.cluster.local."
    upstream_port: 9481
    # VictoriaLogs Loki-compatible path (note the /insert prefix).
    upstream_path: "/insert/loki/api/v1/push"
    service_name: "https-gateway"
    capture_request_headers: true
    capture_request_body: true
    capture_response_headers: true
    capture_response_body: true
    max_body_bytes: 65536
