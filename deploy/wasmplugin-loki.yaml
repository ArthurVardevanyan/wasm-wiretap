# ──────────────────────────────────────────────────────────────────────
# Example: Deploy wasm-wiretap with Loki backend on an Istio gateway
# ──────────────────────────────────────────────────────────────────────
#
# Prerequisites:
#   1. Build and push the OCI image containing the .wasm binary:
#        docker build -t ghcr.io/<you>/wasm-wiretap:latest .
#        docker push ghcr.io/<you>/wasm-wiretap:latest
#
#   2. Make sure a Loki instance is reachable inside the mesh, e.g.
#      via a ServiceEntry or a real Service.
# ──────────────────────────────────────────────────────────────────────

---
# ServiceEntry so Envoy knows how to reach Loki.
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: loki-external
  namespace: openshift-ingress
spec:
  hosts:
    - loki.loki.svc.cluster.local.
  ports:
    - number: 3100
      name: http
      protocol: HTTP
  resolution: DNS
  location: MESH_INTERNAL

---
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: wasm-wiretap
  namespace: openshift-ingress
spec:
  # Target the gateway workload(s).
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: https-gateway

  # Where Istio pulls the .wasm binary from (OCI image).
  url: oci://registry.arthurvardevanyan.com/homelab/wasm-wiretap@sha256:0c56fdc4f0da4e205db09cbd06ba9bd1034b1f06ccbae1aca7bb746eb999a86e

  # Phase – AUTHN runs early; STATS runs late.  For passive capture
  # we typically want STATS so we see final response codes.
  phase: STATS
  priority: 1

  # JSON config forwarded to the plugin's on_configure().
  pluginConfig:
    backend: "loki"
    upstream_cluster: "outbound|3100||loki.loki.svc.cluster.local."
    upstream_authority: "loki.loki.svc.cluster.local."
    upstream_port: 3100
    upstream_path: "/loki/api/v1/push"
    service_name: "https-gateway"
    capture_request_headers: true
    capture_request_body: true
    capture_response_headers: true
    capture_response_body: true
    max_body_bytes: 65536
    labels:
      env: "production"
      team: "platform"
